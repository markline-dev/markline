# Markline Ask AI — Cloudflare Worker config.
# Deploy:  npm install && wrangler secret put MARKLINE_AI_KEY && npm run deploy
name = "markline-ai"
main = "src/worker.ts"
compatibility_date = "2024-11-01"

# Non-secret knobs. The provider key is a SECRET — never put it here:
#   wrangler secret put MARKLINE_AI_KEY
[vars]
MARKLINE_AI_PROVIDER = "openrouter"
MARKLINE_AI_MODEL = "deepseek/deepseek-v4-flash"
MARKLINE_AI_MAX_TOKENS = "1024"
# Comma-separated list of docs origins allowed to call this Worker.
# Pin this to your site(s); "*" allows any origin (not recommended).
MARKLINE_ALLOWED_ORIGIN = "https://markline.dev"
MARKLINE_RATE_PER_MIN = "10"
MARKLINE_SITE_NAME = "Markline"
# For "openai-compatible" providers, also set:
# MARKLINE_AI_BASE_URL = "https://your-endpoint/v1"
