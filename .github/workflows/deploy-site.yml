name: Deploy site to GitHub Pages

# Builds Markline's own site (the content in `site/`) as a static export and
# publishes it to GitHub Pages at the custom domain markline.dev.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build static site
        run: npm run build
        env:
          MARKLINE_CONTENT: site
          MARKLINE_EXPORT: "1"
          # Custom domain (markline.dev) is served at the root, so no base path.
      - name: Add custom domain + disable Jekyll
        run: |
          echo 'markline.dev' > out/CNAME
          touch out/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          # Create/enable the Pages site from the workflow if it isn't already,
          # so the first deploy doesn't require toggling Settings → Pages by hand.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
